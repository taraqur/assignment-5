<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <section id="login-page">
        <div class="login-card">
            <div class="github-logo"><i class="fab fa-github"></i></div>
            <h1>GitHub Issues Tracker</h1>
            <p>Sign in to manage your issues</p>
            <form id="login-form">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <span class="hint">Default: admin</span>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <span class="hint">Default: admin123</span>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <div class="demo-info">
                <p><strong>Demo Credentials:</strong> admin / admin123</p>
            </div>
        </div>
    </section>

    <section id="dashboard-page" style="display: none;">
        <nav class="top-nav">
            <div class="nav-container">
                <div class="brand">
                    <i class="fab fa-github"></i>
                    <span>GitHub Issues Tracker</span>
                </div>
                <div class="nav-actions">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search issues...">
                    </div>
                    <button class="btn-new-issue"><i class="fas fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>

        <main class="main-container">
            <div class="filter-tabs">
                <button class="tab active" onclick="filterIssues('all', this)">All</button>
                <button class="tab" onclick="filterIssues('open', this)">Open</button>
                <button class="tab" onclick="filterIssues('closed', this)">Closed</button>
            </div>

            <div class="stats-header">
                <div class="stats-left">
                    <div class="stats-icon"><i class="fas fa-bullseye"></i></div>
                    <div>
                        <h2 id="total-count">0 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="stats-right">
                    <span><span class="dot open-dot"></span> Open</span>
                    <span><span class="dot closed-dot"></span> Closed</span>
                </div>
            </div>

            <div id="issues-grid" class="issues-grid"></div>
        </main>
    </section>

    <div id="issue-modal" class="modal">
        <div class="modal-body">
            <h2 id="m-title">Issue Title</h2>
            <div class="m-meta">
                <span id="m-status" class="m-badge">Status</span>
                <span></span>
            </div>
            <div class="m-tags">
                <span class="tag bug">BUG</span>
                <span class="tag help">HELP WANTED</span>
            </div>
            <p id="m-desc">Description text...</p>
            <div class="m-footer-grid">
                <div class="m-info">
                    <label>Assignee:</label>
                    <span id="m-assignee">Tarek</span>
                </div>
                <div class="m-info">
                    <label>Priority:</label>
                    <span id="m-priority" class="p-badge">High</span>
                </div>
            </div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
