<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <section id="login-page">
        <div class="login-card">
            <div class="logo-area"><i class="fab fa-github"></i></div>
            <h1>GitHub Issues Tracker</h1>
            <p>Sign in to manage your issues</p>
            <form id="login-form">
                <div class="input-box">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <span class="hint-text">Default: admin</span>
                </div>
                <div class="input-box">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <span class="hint-text">Default: admin123</span>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <div class="demo-creds">
                <p><strong>Demo:</strong> admin / admin123</p>
            </div>
        </div>
    </section>

    <section id="dashboard-page" style="display: none;">
        <nav class="top-nav">
            <div class="nav-container">
                <div class="brand">
                    <i class="fab fa-github"></i>
                    <span>GitHub Issues Tracker</span>
                </div>
                <div class="nav-right">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search issues...">
                    </div>
                    <button class="btn-new-issue"><i class="fas fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>

        <div class="main-body">
            <div class="tabs">
                <button class="tab-item active" onclick="filterData('all', this)">All</button>
                <button class="tab-item" onclick="filterData('open', this)">Open</button>
                <button class="tab-item" onclick="filterData('closed', this)">Closed</button>
            </div>

            <div class="stats-header">
                <div class="stats-info">
                    <div class="icon-circle"><i class="fas fa-bullseye"></i></div>
                    <div>
                        <h2 id="total-text">0 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="status-legend">
                    <span><span class="dot green"></span> Open</span>
                    <span><span class="dot purple"></span> Closed</span>
                </div>
            </div>

            <div id="issues-grid" class="issues-grid"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
